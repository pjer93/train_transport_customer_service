services:
  db:
    image: mysql:8.0
    container_name: train-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: train_tickets
      MYSQL_USER: train_user
      MYSQL_PASSWORD: train_password
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
